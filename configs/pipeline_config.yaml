# Deep Paper Reader — Pipeline Configuration
# Adjust these parameters based on feedback loop results

pipeline:
  name: "deep-paper-reader"
  version: "0.1.0"
  target_domain: "neuroscience"
  default_language: "en"  # Primary paper language
  supported_languages: ["en", "ko"]  # For mixed-language support

# ─── Stage 1: Skeleton Scan ────────────────────────────────────
stage1:
  # PDF Parsing
  parser: "mineru"  # Options: mineru, nougat, marker, docling
  parser_config:
    auto_mode: true
    language: "en"
    output_format: "markdown"
    extract_images: true
    extract_tables: true
    extract_formulas: true

  # Layout Detection
  layout_model: "doclayout-yolo"  # Options: doclayout-yolo, layoutlmv3, dit
  
  # Figure Extraction
  figure_resolution: 300  # DPI — adjustable range: 150-600
  figure_format: "png"
  link_figures_to_captions: true

  # Initial VLM Description — LOCAL ONLY
  skeleton_vlm: "qwen3-vl-8b"  # Local inference only. No API calls.
  skeleton_vlm_temperature: 0.1
  skeleton_vlm_max_tokens: 256  # Keep initial descriptions brief

  # Chunking
  chunk_size: 512  # tokens — adjustable range: 256-2048
  chunk_overlap: 64  # tokens

# ─── Stage 2: Argument Extraction ──────────────────────────────
stage2:
  # Reasoning LLM — prefer local, free API fallback only
  reasoning_model: "deepseek-r1"  # Primary: DeepSeek-R1 (self-hosted or free API)
  # Fallback: Gemini Flash (free tier). Claude/GPT NOT used (paid API).
  reasoning_temperature: 0.2
  reasoning_max_tokens: 4096

  # Prompt Chain Configuration
  prompt_chain_depth: 5  # Number of chained prompts — adjustable: 3-8
  prompt_chain_steps:
    - "extract_background_claims"
    - "identify_research_gap"
    - "extract_main_claim"
    - "formalize_hypotheses"
    - "map_experimental_design"
  
  # Hypothesis Formalization
  hypothesis_formality: "semi-formal"  # Options: casual, semi-formal, formal
  require_directional_prediction: true
  require_metric_specification: true
  link_hypotheses_to_figures: true

# ─── Stage 3: Figure Deep Interpretation ───────────────────────
stage3:
  # Figure VLM — LOCAL ONLY (confirmed: Qwen3-VL self-hosted)
  figure_vlm: "qwen3-vl-8b"  # Primary: Qwen3-VL-8B local. Upgrade: qwen3-vl-72b on GPU server
  figure_vlm_temperature: 0.1  # Lower = more deterministic readings
  figure_vlm_max_tokens: 2048

  # Prediction Generation (uses reasoning_model from stage2)
  prediction_specificity: "directional"  # Options: directional, quantitative, both
  prediction_confidence_threshold: 0.3  # Below this, prediction is marked "low confidence"

  # Quantitative Reading
  num_quantitative_reads: 3  # How many data points to estimate per element — adjustable: 1-10
  quantitative_tolerance: 0.15  # 15% tolerance for quantitative matching

  # Prediction-Observation Matching (uses reasoning_model from stage2)
  match_threshold: 0.6  # Confidence threshold for "supported"
  flag_surprises: true  # Highlight unexpected findings

  # Chart-specific model (optional)
  use_chart_specialist: false  # Enable ChartVLM/EvoChart for difficult figures
  chart_specialist_model: null  # Set to "chartvlm" or "evochart" if enabled

# ─── Stage 4: Discussion Critical Reading ──────────────────────
stage4:
  # Uses same reasoning_model as stage2
  critical_depth: "moderate"  # Options: brief, moderate, deep
  identify_unacknowledged_limitations: true
  identify_missing_alternatives: true
  max_tokens: 2048

# ─── Embedding (confirmed: BGE-M3, no change planned) ──────────
embedding:
  model: "bge-m3"  # Confirmed: stay with BGE-M3 (already in CSNL stack)
  dimensions: 1024
  enable_sparse: true  # BGE-M3 sparse retrieval
  enable_multi_vector: false  # ColBERT-style — disable initially for simplicity
  
  # Multi-level embedding weights (for combined search)
  level_weights:
    paper_skeleton: 0.30
    hypothesis: 0.25
    figure_analysis: 0.25
    prediction_match: 0.10
    discussion: 0.10

  # Storage
  vector_store: "lightrag"  # Existing CSNL infrastructure
  index_name: "dpr_papers"

# ─── Feedback Loop ─────────────────────────────────────────────
feedback:
  # Review Agent — uses same local model as reasoning
  enable_review_agent: true
  review_agent_model: "deepseek-r1"  # Local, no API cost
  review_agent_temperature: 0.3

  # Scoring Thresholds
  rerun_threshold: 2.5
  parameter_adjust_threshold: 3

  # User Feedback — web interface (FastAPI)
  enable_user_feedback: true  # Confirmed: build web UI
  feedback_storage: "sqlite"
  feedback_ui_port: 8501  # Streamlit or FastAPI port

  # Logging
  log_all_outputs: true
  log_review_scores: true
  log_parameter_changes: true

# ─── Data Policy ───────────────────────────────────────────────
data_policy:
  # Confirmed: local-first, free API only as fallback
  allow_external_api: "free_only"  # "free_only" | "all" | "none"
  free_apis:
    - "deepseek"      # Free API tier
    - "gemini-flash"   # Free tier via AI Studio
  local_models:
    - "qwen3-vl-8b"
    - "qwen3-vl-72b"
    - "deepseek-r1"
    - "bge-m3"
  never_send_unpublished: true  # Unpublished manuscripts: local only, always

# ─── Infrastructure ────────────────────────────────────────────
infrastructure:
  # Local GPU
  gpu_device: "cuda:0"  # or "mps" for Mac Studio
  max_gpu_memory: "24GB"

  # API Configuration — FREE ONLY
  # anthropic_api_key_env: NOT USED (paid)
  # openai_api_key_env: NOT USED (paid)
  deepseek_api_key_env: "DEEPSEEK_API_KEY"  # Free tier
  google_api_key_env: "GOOGLE_API_KEY"  # Gemini free tier via AI Studio

  # Zotero Integration — paper source
  zotero:
    enabled: true
    library_type: "user"  # "user" or "group"
    library_id_env: "ZOTERO_LIBRARY_ID"
    api_key_env: "ZOTERO_API_KEY"
    collection: null  # null = all collections
    sync_attachments: true  # Download PDFs from Zotero storage
    local_storage: "./zotero_pdfs/"

  # Processing
  batch_size: 4
  timeout_per_stage: 300
  retry_on_failure: 2

  # Output
  output_dir: "./output"
  output_format: "yaml"
  save_intermediate: true
